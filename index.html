<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Commander's Checklist</title>

  <!-- PWA -->
  <meta name="theme-color" content="#00FF41" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Commander" />
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!-- React + Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; min-height: 100vh; }
    body { font-family: 'JetBrains Mono', 'Courier New', monospace; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #00FF4133; }
    ::placeholder { color: #444; font-family: 'JetBrains Mono', 'Courier New', monospace; }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes success-pulse {
      0%   { background: radial-gradient(ellipse at center, rgba(0,255,65,0.18) 0%, transparent 70%); }
      50%  { background: radial-gradient(ellipse at center, rgba(0,255,65,0.08) 0%, transparent 70%); }
      100% { background: transparent; }
    }
    @keyframes flicker-in {
      0%   { opacity: 0; text-shadow: 0 0 30px rgba(0,255,65,1); }
      30%  { opacity: 0.4; }
      60%  { opacity: 0.9; }
      80%  { opacity: 0.7; }
      100% { opacity: 1; }
    }
    @keyframes glitch {
      0%   { transform: skewX(0deg); text-shadow: 0 0 10px rgba(0,255,65,0.6); }
      20%  { transform: skewX(-1.5deg); text-shadow: 3px 0 #FF0000, -3px 0 #00FFFF; }
      40%  { transform: skewX(1deg); text-shadow: -2px 0 #FF0000, 2px 0 #00FFFF; }
      60%  { transform: skewX(-0.5deg); text-shadow: 2px 0 #FF0000, -2px 0 #00FFFF; }
      100% { transform: skewX(0deg); text-shadow: 0 0 10px rgba(0,255,65,0.6); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .glitch-active { animation: glitch 0.15s ease-in-out; }
    .pulse-red-anim { animation: pulse-red 1.5s ease-in-out infinite; }
    .flicker { animation: flicker-in 0.7s ease-out forwards; }
    .success-bg { animation: success-pulse 2s ease-out forwards; }
    .cursor::after { content: '_'; animation: blink 1s step-end infinite; color: #00FF41; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ============================================================
    // MOCK DATA LAYER — swap for Supabase later
    // ============================================================
    const MockDB = {
      getState: () => {
        try { const r = localStorage.getItem("cdr_state"); return r ? JSON.parse(r) : null; }
        catch { return null; }
      },
      setState: (data) => {
        try { localStorage.setItem("cdr_state", JSON.stringify(data)); } catch {}
      },
      defaultState: () => ({ streak: 0, lastSubmitDate: null, logs: [] }),
    };

    // ============================================================
    // QUOTE ENGINE
    // ============================================================
    const QUOTES = {
      discipline: [
        "I am the master of my fate, the captain of my soul.",
        "The biggest battle is the one you fight with yourself.",
        "Discipline is doing what needs to be done, even when you don't want to.",
        "Every rep, every session, every trade — it compounds.",
        "You signed a contract with yourself. Honor it.",
      ],
      restoration: [
        "You are stronger than you seem, braver than you believe.",
        "You don't have to be great to start — but start to be great.",
        "The warrior rests. The warrior returns. The mission continues.",
        "Missing one day does not erase the war you've been winning.",
        "Integrity is built in the moments no one is watching.",
      ],
      shutdown: [
        "I'm not a backup plan, and I'm not a second choice.",
        "I don't compete. I dominate.",
        "You can't handle the real me.",
        "The alter ego takes — it never gives back.",
        "Every time you let it win, you lose ground you bled to gain.",
      ],
    };

    const getRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const today = () => new Date().toISOString().split("T")[0];
    const yesterday = () => { const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().split("T")[0]; };

    // ============================================================
    // SOUND ENGINE
    // ============================================================
    function playSuccessSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        [{ freq:523, start:0, dur:0.08 }, { freq:659, start:0.09, dur:0.08 }, { freq:784, start:0.18, dur:0.18 }]
          .forEach(({ freq, start, dur }) => {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = "square";
            osc.frequency.setValueAtTime(freq, now + start);
            gain.gain.setValueAtTime(0.12, now + start);
            gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
            osc.start(now + start); osc.stop(now + start + dur + 0.01);
          });
      } catch(e) {}
    }

    // ============================================================
    // ASCII BANNER
    // ============================================================
    const ASCII_BANNER = `
███╗   ███╗██╗███████╗███████╗██╗ ██████╗ ███╗  ██╗
████╗ ████║██║██╔════╝██╔════╝██║██╔═══██╗████╗ ██║
██╔████╔██║██║███████╗███████╗██║██║   ██║██╔██╗██║
██║╚██╔╝██║██║╚════██║╚════██║██║██║   ██║██║╚████║
██║ ╚═╝ ██║██║███████║███████║██║╚██████╔╝██║ ╚███║
╚═╝     ╚═╝╚═╝╚══════╝╚══════╝╚═╝ ╚═════╝╚═╝  ╚══╝

█████╗  ██████╗ ██████╗ ██████╗ ███╗   ███╗██████╗ ██╗     ██╗███████╗██╗  ██╗███████╗██████╗
██╔══██╗██╔════╝██╔════╝██╔═══██╗████╗ ████║██╔══██╗██║     ██║██╔════╝██║  ██║██╔════╝██╔══██╗
███████║██║     ██║     ██║   ██║██╔████╔██║██████╔╝██║     ██║███████╗███████║█████╗  ██║  ██║
██╔══██║██║     ██║     ██║   ██║██║╚██╔╝██║██╔═══╝ ██║     ██║╚════██║██╔══██║██╔══╝  ██║  ██║
██║  ██║╚██████╗╚██████╗╚██████╔╝██║ ╚═╝ ██║██║     ███████╗██║███████║██║  ██║███████╗██████╔╝
╚═╝  ╚═╝ ╚═════╝ ╚═════╝╚═════╝ ╚═╝     ╚═╝╚═╝     ╚══════╝╚═╝╚══════╝╚═╝  ╚═╝╚══════╝╚═════╝`.trim();

    // ============================================================
    // COMPONENTS
    // ============================================================

    function CRTOverlay() {
      return (
        <div style={{
          position:"fixed", inset:0, pointerEvents:"none", zIndex:9999,
          background:"repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.013) 2px, rgba(0,255,65,0.013) 4px)",
        }} />
      );
    }

    function GlitchHeader() {
      const [active, setActive] = useState(false);
      useEffect(() => {
        const iv = setInterval(() => {
          setActive(true);
          setTimeout(() => setActive(false), 150);
        }, 4000 + Math.random() * 3000);
        return () => clearInterval(iv);
      }, []);
      return (
        <div className={active ? "glitch-active" : ""} style={{
          fontSize:"clamp(18px,4.5vw,28px)", color:"#00FF41",
          letterSpacing:"0.15em",
          textShadow:"0 0 10px rgba(0,255,65,0.6)",
          fontWeight:700,
        }}>
          THE COMMANDER'S CHECKLIST
        </div>
      );
    }

    function Btn({ onClick, children, variant="primary", disabled }) {
      const [pressed, setPressed] = useState(false);
      const C = { primary:{b:"#00FF41",t:"#00FF41",g:"rgba(0,255,65,0.25)"}, danger:{b:"#FF0000",t:"#FF0000",g:"rgba(255,0,0,0.25)"}, warn:{b:"#FFD700",t:"#FFD700",g:"rgba(255,215,0,0.25)"} };
      const c = C[variant];
      return (
        <button onClick={() => { if(!disabled){setPressed(true);setTimeout(()=>setPressed(false),120);onClick?.();} }}
          style={{
            background: pressed ? c.g : "transparent",
            border:`1px solid ${disabled?"#2a2a2a":c.b}`,
            color: disabled?"#3a3a3a":c.t,
            fontFamily:"'JetBrains Mono','Courier New',monospace",
            fontSize:"12px", letterSpacing:"0.1em",
            padding:"11px 20px", cursor:disabled?"not-allowed":"pointer",
            textShadow: disabled?"none":`0 0 8px ${c.g}`,
            boxShadow: disabled?"none":`0 0 8px ${c.g}`,
            transform: pressed?"scale(0.97)":"scale(1)",
            transition:"all 0.1s", width:"100%", marginTop:"10px",
            textTransform:"uppercase",
          }}>
          [{children}]
        </button>
      );
    }

    function Toggle({ label, value, onChange, variant="primary" }) {
      const col = variant==="danger" ? "#FF0000" : "#00FF41";
      return (
        <div onClick={()=>onChange(!value)} style={{
          display:"flex", alignItems:"center", gap:"14px",
          cursor:"pointer", padding:"13px 0", borderBottom:"1px solid #111",
          userSelect:"none",
        }}>
          <div style={{
            width:"40px", height:"22px",
            border:`1px solid ${value?col:"#2a2a2a"}`,
            background: value?`${col}20`:"transparent",
            display:"flex", alignItems:"center",
            justifyContent: value?"flex-end":"flex-start",
            padding:"3px", transition:"all 0.2s",
            boxShadow: value?`0 0 8px ${col}44`:"none",
            flexShrink:0,
          }}>
            <div style={{
              width:"14px", height:"14px",
              background: value?col:"#2a2a2a",
              transition:"all 0.2s",
              boxShadow: value?`0 0 6px ${col}`:"none",
            }} />
          </div>
          <span style={{
            fontSize:"12px", color: value?col:"#aaa",
            letterSpacing:"0.05em",
            textShadow: value?`0 0 6px ${col}44`:"none",
            transition:"all 0.2s", lineHeight:"1.4",
          }}>{label}</span>
        </div>
      );
    }

    function QuoteBox({ text, variant="discipline" }) {
      const col = variant==="shutdown"?"#FF0000":variant==="restore"?"#FFD700":"#00FF41";
      return (
        <div style={{
          borderLeft:`3px solid ${col}`, border:`1px solid ${col}18`,
          borderLeft:`3px solid ${col}`,
          padding:"14px 16px", margin:"16px 0",
          background:`${col}07`,
        }}>
          <div style={{
            fontSize:"11px", color:col, letterSpacing:"0.05em",
            lineHeight:"1.8", textShadow:`0 0 6px ${col}44`, fontStyle:"italic",
          }}>
            // "{text}"
          </div>
        </div>
      );
    }

    function ProgressBar({ label, onComplete, alterEgoWon }) {
      const [pct, setPct] = useState(0);
      const [done, setDone] = useState(false);
      const fired = useRef(false);
      useEffect(() => {
        const steps = [0,15,30,48,62,78,89,95,100];
        let i = 0;
        const iv = setInterval(() => {
          if (i < steps.length) {
            const val = steps[i];
            setPct(val);
            if (val===100 && !fired.current && !alterEgoWon) { fired.current=true; playSuccessSound(); }
            i++;
          } else { setDone(true); clearInterval(iv); setTimeout(onComplete, 600); }
        }, 280);
        return () => clearInterval(iv);
      }, []);
      const bars = Math.floor(pct/4);
      return (
        <div style={{ textAlign:"center", padding:"40px 20px" }}>
          <div style={{ fontSize:"11px", color:"#00FF41", letterSpacing:"0.15em", marginBottom:"20px", textShadow:"0 0 8px rgba(0,255,65,0.6)" }}>
            {done ? "// LOGS SECURED" : label}
          </div>
          <div style={{ border:"1px solid #00FF41", padding:"4px", marginBottom:"12px" }}>
            <div style={{
              height:"16px", width:`${pct}%`,
              background: done?"#00FF41":"repeating-linear-gradient(90deg,#00FF41 0px,#00FF41 6px,#003300 6px,#003300 8px)",
              transition:"width 0.25s", boxShadow:"0 0 10px rgba(0,255,65,0.5)",
            }} />
          </div>
          <div style={{ fontSize:"10px", color:"#00FF41", opacity:0.7 }}>
            {"[" + "█".repeat(bars) + "░".repeat(25-bars) + "]"} {pct}%
          </div>
        </div>
      );
    }

    // ============================================================
    // SCREENS
    // ============================================================

    function BreachScreen({ onResolve }) {
      const [choice, setChoice] = useState(null);
      return (
        <div style={{ padding:"0 0 30px" }}>
          <div className="pulse-red-anim" style={{ textAlign:"center", marginBottom:"30px" }}>
            <div style={{ fontSize:"clamp(20px,5vw,30px)", color:"#FF0000", letterSpacing:"0.2em", textShadow:"0 0 20px rgba(255,0,0,0.8)", marginBottom:"8px" }}>
              ⚠ BREACH DETECTED
            </div>
            <div style={{ fontSize:"11px", color:"#FF000077", letterSpacing:"0.15em" }}>
              // CHECKLIST NOT FILED — YESTERDAY
            </div>
          </div>

          {!choice ? (
            <>
              <div style={{ fontSize:"12px", color:"#aaa", letterSpacing:"0.08em", marginBottom:"20px", lineHeight:"2" }}>
                {">"} INCIDENT REPORT REQUIRED.<br/>
                {">"} STATE THE REASON FOR NON-COMPLIANCE:
              </div>
              <Btn onClick={()=>setChoice("forgot")} variant="warn">Forgot / Was Unwell</Btn>
              <Btn onClick={()=>setChoice("broke")} variant="danger">Broke The Rule</Btn>
            </>
          ) : choice==="forgot" ? (
            <div>
              <div style={{ fontSize:"14px", color:"#FFD700", textAlign:"center", letterSpacing:"0.1em", margin:"20px 0", textShadow:"0 0 10px rgba(255,215,0,0.5)" }}>
                // INTEGRITY MAINTAINED
              </div>
              <QuoteBox text={getRandom(QUOTES.restoration)} variant="restore" />
              <div style={{ fontSize:"11px", color:"#888", marginBottom:"20px", lineHeight:"1.8" }}>
                {">"} Streak preserved. Do not miss again.
              </div>
              <Btn onClick={()=>onResolve("restore")}>Acknowledge & Continue</Btn>
            </div>
          ) : (
            <div>
              <div style={{ fontSize:"14px", color:"#FF0000", textAlign:"center", letterSpacing:"0.1em", margin:"20px 0", textShadow:"0 0 10px rgba(255,0,0,0.8)" }}>
                // SYSTEM FAILURE — STREAK RESET
              </div>
              <QuoteBox text={getRandom(QUOTES.shutdown)} variant="shutdown" />
              <div style={{ fontSize:"11px", color:"#FF000066", marginBottom:"20px", lineHeight:"1.8" }}>
                {">"} Rebuild from zero. Earn it back.
              </div>
              <Btn onClick={()=>onResolve("reset")} variant="danger">Accept Consequence</Btn>
            </div>
          )}
        </div>
      );
    }

    function ResultScreen({ alterEgoWon, improvement, onDone }) {
      const isFailure = alterEgoWon;
      const col = isFailure ? "#FF0000" : "#00FF41";
      const quote = getRandom(isFailure ? QUOTES.shutdown : QUOTES.discipline);
      const label = isFailure ? "// RED DAY — ALTER EGO CLAIMED THIS ONE" : "// MISSION COMPLETE — DISCIPLINE LOGGED";
      const [pulse, setPulse] = useState(true);
      useEffect(() => { const t = setTimeout(()=>setPulse(false),2000); return ()=>clearTimeout(t); }, []);

      return (
        <div className={pulse && !isFailure ? "success-bg" : ""} style={{ textAlign:"center", padding:"10px 0 30px" }}>

          {!isFailure && (
            <div className="flicker" style={{ marginBottom:"24px", padding:"20px 0 8px", textAlign:"center" }}>
              <div style={{
                fontSize:"clamp(28px, 8vw, 48px)",
                color:"#00FF41",
                fontFamily:"'JetBrains Mono','Courier New',monospace",
                fontWeight:700,
                letterSpacing:"0.12em",
                textShadow:"0 0 20px rgba(0,255,65,0.9), 0 0 40px rgba(0,255,65,0.4), 0 0 80px rgba(0,255,65,0.2)",
                lineHeight:"1.2",
              }}>
                MISSION<br/>ACCOMPLISHED
              </div>
              <div style={{
                fontSize:"11px", color:"#00FF4166",
                letterSpacing:"0.3em", marginTop:"8px",
                fontFamily:"'JetBrains Mono','Courier New',monospace",
              }}>
                ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
              </div>
            </div>
          )}

          <div style={{ fontSize:"12px", color:col, letterSpacing:"0.1em", textShadow:`0 0 10px ${col}88`, marginBottom:"20px", lineHeight:"1.8" }}>
            {label}
          </div>

          <QuoteBox text={quote} variant={isFailure?"shutdown":"discipline"} />

          {improvement && (
            <div style={{ border:"1px solid #1a1a1a", padding:"12px 14px", margin:"16px 0", textAlign:"left" }}>
              <div style={{ fontSize:"10px", color:"#888", marginBottom:"6px" }}>// 1% IMPROVEMENT FILED:</div>
              <div style={{ fontSize:"12px", color:"#bbb", lineHeight:"1.6" }}>{improvement}</div>
            </div>
          )}

          <Btn onClick={onDone} variant={isFailure?"danger":"primary"}>Close Session</Btn>
        </div>
      );
    }

    function ChecklistForm({ state, onSubmit }) {
      const [energy, setEnergy] = useState(false);
      const [alterEgo, setAlterEgo] = useState(false);
      const [improvement, setImprovement] = useState("");
      const [encrypting, setEncrypting] = useState(false);
      const [done, setDone] = useState(false);

      if (done) return <ResultScreen alterEgoWon={alterEgo} improvement={improvement} onDone={()=>onSubmit({energy,alterEgo,improvement})} />;
      if (encrypting) return <ProgressBar label="// ENCRYPTING LOGS..." onComplete={()=>setDone(true)} alterEgoWon={alterEgo} />;

      return (
        <div>
          <div style={{ textAlign:"center", padding:"20px 0 24px", borderBottom:"1px solid #0d0d0d", marginBottom:"24px" }}>
            <div style={{ fontSize:"11px", color:"#888", letterSpacing:"0.15em", marginBottom:"4px" }}>// DAYS OF DISCIPLINE</div>
            <div style={{ fontSize:"clamp(52px,13vw,76px)", color:"#00FF41", textShadow:"0 0 30px rgba(0,255,65,0.4)", lineHeight:"1" }}>
              {String(state.streak).padStart(3,"0")}
            </div>
          </div>

          <div style={{ marginBottom:"24px" }}>
            <Toggle label="Protected my energy today" value={energy} onChange={setEnergy} />
            <Toggle label="Let the Alter Ego win [CRITICAL]" value={alterEgo} onChange={setAlterEgo} variant="danger" />
          </div>

          <div style={{ marginBottom:"24px" }}>
            <div style={{ fontSize:"10px", color:"#aaa", letterSpacing:"0.1em", marginBottom:"8px" }}>{">"} 1% IMPROVEMENT FOR TOMORROW:</div>
            <textarea
              value={improvement}
              onChange={e=>setImprovement(e.target.value)}
              placeholder="> Enter directive..."
              onFocus={e=>e.target.style.borderColor="#00FF41"}
              onBlur={e=>e.target.style.borderColor="#1a1a1a"}
              style={{
                width:"100%", minHeight:"80px",
                background:"#000", border:"1px solid #1a1a1a",
                color:"#00FF41", fontFamily:"'JetBrains Mono','Courier New',monospace",
                fontSize:"12px", padding:"12px", resize:"none",
                outline:"none", caretColor:"#00FF41", lineHeight:"1.6",
                transition:"border-color 0.2s",
              }}
            />
          </div>

          <Btn onClick={()=>setEncrypting(true)} disabled={!improvement.trim()} variant={alterEgo?"danger":"primary"}>
            Submit Daily Audit
          </Btn>
        </div>
      );
    }

    function AlreadyFiledScreen({ state }) {
      return (
        <div style={{ textAlign:"center", padding:"20px 0" }}>
          <div style={{ fontSize:"clamp(52px,13vw,76px)", color:"#00FF41", textShadow:"0 0 30px rgba(0,255,65,0.4)", lineHeight:"1", marginBottom:"8px" }}>
            {String(state.streak).padStart(3,"0")}
          </div>
          <div style={{ fontSize:"11px", color:"#888", letterSpacing:"0.15em", marginBottom:"24px" }}>// DAYS OF DISCIPLINE</div>
          <div style={{ border:"1px solid #001a00", padding:"14px 16px", marginBottom:"16px" }}>
            <div style={{ fontSize:"11px", color:"#00FF4190", letterSpacing:"0.1em", lineHeight:"2" }}>
              // AUDIT LOGGED FOR TODAY<br/>{">"} Return tomorrow, Commander.
            </div>
          </div>
          <QuoteBox text={getRandom(QUOTES.discipline)} variant="discipline" />
        </div>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function App() {
      const [appState, setAppState] = useState(null);
      const [screen, setScreen] = useState("loading");

      useEffect(() => {
        const raw = MockDB.getState() || MockDB.defaultState();
        const t = today(), y = yesterday();
        if (raw.lastSubmitDate === t) { setAppState(raw); setScreen("filed"); return; }
        if (raw.lastSubmitDate && raw.lastSubmitDate !== y && raw.lastSubmitDate !== t) { setAppState(raw); setScreen("breach"); return; }
        setAppState(raw); setScreen("checklist");
      }, []);

      const handleBreachResolve = (res) => {
        const u = {...appState};
        if (res==="reset") u.streak = 0;
        setAppState(u); MockDB.setState(u); setScreen("checklist");
      };

      const handleSubmit = ({energy,alterEgo,improvement}) => {
        const u = {...appState};
        u.lastSubmitDate = today();
        u.streak = alterEgo ? 0 : (u.streak||0)+1;
        u.logs = [...(u.logs||[]), {date:today(),energy,alterEgo,improvement}];
        MockDB.setState(u); setAppState(u); setScreen("filed");
      };

      const renderScreen = () => {
        if (screen==="loading"||!appState) return <div style={{textAlign:"center",padding:"40px",fontSize:"11px",color:"#666"}}>{">"} INITIALIZING SYSTEM...</div>;
        if (screen==="breach") return <BreachScreen onResolve={handleBreachResolve} />;
        if (screen==="checklist") return <ChecklistForm state={appState} onSubmit={handleSubmit} />;
        if (screen==="filed") return <AlreadyFiledScreen state={appState} />;
      };

      const dateStr = new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"}).toUpperCase();

      return (
        <>
          <CRTOverlay />
          <div style={{ minHeight:"100vh", background:"#000", display:"flex", justifyContent:"center", padding:"24px 16px" }}>
            <div style={{ width:"100%", maxWidth:"480px" }}>

              {/* Header */}
              <div style={{ marginBottom:"8px" }}>
                <div style={{ fontSize:"10px", color:"#556", letterSpacing:"0.2em", marginBottom:"6px" }}>
                  {">"} FALCON'S HUNT — CLASSIFIED SYSTEM v1.0
                </div>
                <GlitchHeader />
                <div style={{ fontSize:"10px", color:"#556", letterSpacing:"0.1em", marginTop:"5px" }}>
                  {">"} {dateStr}
                </div>
              </div>

              {/* Divider */}
              <div style={{ height:"1px", background:"linear-gradient(90deg,#00FF41,transparent)", margin:"16px 0 24px", boxShadow:"0 0 6px rgba(0,255,65,0.3)" }} />

              {/* Screen */}
              {renderScreen()}

              {/* Footer */}
              <div style={{ marginTop:"40px", borderTop:"1px solid #0a0a0a", paddingTop:"16px", fontSize:"9px", color:"#444", letterSpacing:"0.1em", textAlign:"center" }}>
                // OPERATIONAL SECURITY ENABLED — ALL LOGS ENCRYPTED LOCALLY
              </div>


            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/commander-s-checklist/service-worker.js', {
        scope: '/commander-s-checklist/'
      })
      .then(reg => console.log('SW Registered for Folder:', reg.scope))
      .catch(err => console.log('SW Registration Failed:', err));
    });
  }
</script>

</body>
</html>
