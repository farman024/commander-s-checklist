  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; min-height: 100vh; }
    body { font-family: 'JetBrains Mono', 'Courier New', monospace; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #00FF4133; }
    ::placeholder { color: #444; font-family: 'JetBrains Mono', 'Courier New', monospace; }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes success-pulse {
      0%   { background: radial-gradient(ellipse at center, rgba(0,255,65,0.18) 0%, transparent 70%); }
      50%  { background: radial-gradient(ellipse at center, rgba(0,255,65,0.08) 0%, transparent 70%); }
      100% { background: transparent; }
    }
    @keyframes flicker-in {
      0%   { opacity: 0; text-shadow: 0 0 30px rgba(0,255,65,1); }
      30%  { opacity: 0.4; }
      60%  { opacity: 0.9; }
      80%  { opacity: 0.7; }
      100% { opacity: 1; }
    }
    @keyframes glitch {
      0%   { transform: skewX(0deg); text-shadow: 0 0 10px rgba(0,255,65,0.6); }
      20%  { transform: skewX(-1.5deg); text-shadow: 3px 0 #FF0000, -3px 0 #00FFFF; }
      40%  { transform: skewX(1deg); text-shadow: -2px 0 #FF0000, 2px 0 #00FFFF; }
      60%  { transform: skewX(-0.5deg); text-shadow: 2px 0 #FF0000, -2px 0 #00FFFF; }
      100% { transform: skewX(0deg); text-shadow: 0 0 10px rgba(0,255,65,0.6); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .glitch-active { animation: glitch 0.15s ease-in-out; }
    .pulse-red-anim { animation: pulse-red 1.5s ease-in-out infinite; }
    .flicker { animation: flicker-in 0.7s ease-out forwards; }
    .success-bg { animation: success-pulse 2s ease-out forwards; }
    .cursor::after { content: '_'; animation: blink 1s step-end infinite; color: #00FF41; }
  </style>
</head>

    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsYXRsd3lrc3hha3Fnd21hcnZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDQyNDcsImV4cCI6MjA5MDU4MDI0N30.CbjYYe1Y9TIt6WEiAVfIBjxgf49fv5a8DpFu9L7Hz8o';

    const LS_KEY       = 'cdr_state';

    let sb = null;
    let syncReady = false;

    function initSB() {
      try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); syncReady = true; }
      catch(e) { syncReady = false; }
    }

    function setSyncDot(status) {
      const dot = document.getElementById('syncDot');
      if (!dot) return;
      const c = { syncing:'#ffa726', ok:'#00FF41', error:'#ff4444', offline:'#333' };
      dot.style.background = c[status] || c.offline;
      dot.title = status.toUpperCase();
    }

    const MockDB = {
      defaultState: () => ({ streak:0, lastSubmitDate:null, logs:[], name:null, codename:null }),

      // Save to localStorage instantly, push to Supabase async
      setState: (data) => {
        try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {}
        if (syncReady && sb) MockDB._push(data);
      },

      _push: async (data) => {
        setSyncDot('syncing');
        try {
          const { error } = await sb.from('commander_sync').upsert(
            { key: DB_KEY, data: JSON.stringify(data), updated_at: new Date().toISOString() },
            { onConflict: 'key' }
          );
          if (error) throw error;
          setSyncDot('ok');
        } catch(e) {
          console.warn('[Supabase] Push failed:', e.message);
          setSyncDot('error');
        }
      },

      // Load from Supabase first, fallback to localStorage
      getState: async () => {
        initSB();
        if (syncReady && sb) {
          setSyncDot('syncing');
          try {
            const { data, error } = await sb
              .from('commander_sync')
              .select('data')
              .eq('key', DB_KEY)
              .single();
            if (error && error.code !== 'PGRST116') throw error;
            if (data && data.data) {
              const remote = JSON.parse(data.data);
              // Keep remote in sync with localStorage too
              try { localStorage.setItem(LS_KEY, JSON.stringify(remote)); } catch {}
              setSyncDot('ok');
              return remote;
            }
            // No remote data — push local up if exists
            const local = MockDB._getLocal();
            if (local) MockDB._push(local);
            setSyncDot('ok');
            return local;
          } catch(e) {
            console.warn('[Supabase] Load failed, using local:', e.message);
            setSyncDot('error');
            return MockDB._getLocal();
          }
        } else {
          setSyncDot('offline');
          return MockDB._getLocal();
        }
      },

      _getLocal: () => {
        try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : null; }
        catch { return null; }
      },
    };

    // ============================================================

    function playSuccessSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        [{ freq:523, start:0, dur:0.08 }, { freq:659, start:0.09, dur:0.08 }, { freq:784, start:0.18, dur:0.18 }]
          .forEach(({ freq, start, dur }) => {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = "square";
            osc.frequency.setValueAtTime(freq, now + start);
            gain.gain.setValueAtTime(0.12, now + start);
            gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
            osc.start(now + start); osc.stop(now + start + dur + 0.01);
          });
      } catch(e) {}
    }

██║  ██║╚██████╗╚██████╗╚██████╔╝██║ ╚═╝ ██║██║     ███████╗██║███████║██║  ██║███████╗██████╔╝

    // ============================================================
    // COMPONENTS
    // ============================================================

    function CRTOverlay() {
      return (
        <div style={{
          position:"fixed", inset:0, pointerEvents:"none", zIndex:9999,
          background:"repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.013) 2px, rgba(0,255,65,0.013) 4px)",

    function GlitchHeader() {
      const [active, setActive] = useState(false);
      useEffect(() => {
        const iv = setInterval(() => {
          setActive(true);
          setTimeout(() => setActive(false), 150);
        }, 4000 + Math.random() * 3000);
        return () => clearInterval(iv);
      }, []);
      return (
        <div className={active ? "glitch-active" : ""} style={{
          fontSize:"clamp(18px,4.5vw,28px)", color:"#00FF41",
          letterSpacing:"0.15em",
          textShadow:"0 0 10px rgba(0,255,65,0.6)",
          fontWeight:700,
        }}>
          THE COMMANDER'S CHECKLIST
        </div>
      );
    }

    function Btn({ onClick, children, variant="primary", disabled }) {
      const [pressed, setPressed] = useState(false);
      const C = { primary:{b:"#00FF41",t:"#00FF41",g:"rgba(0,255,65,0.25)"}, danger:{b:"#FF0000",t:"#FF0000",g:"rgba(255,0,0,0.25)"}, warn:{b:"#FFD700",t:"#FFD700",g:"rgba(255,215,0,0.25)"} };
      const c = C[variant];
      return (
        <button onClick={() => { if(!disabled){setPressed(true);setTimeout(()=>setPressed(false),120);onClick?.();} }}
          style={{
            background: pressed ? c.g : "transparent",
            border:`1px solid ${disabled?"#2a2a2a":c.b}`,
            color: disabled?"#3a3a3a":c.t,
            fontFamily:"'JetBrains Mono','Courier New',monospace",
            fontSize:"12px", letterSpacing:"0.1em",
            padding:"11px 20px", cursor:disabled?"not-allowed":"pointer",
            textShadow: disabled?"none":`0 0 8px ${c.g}`,
            boxShadow: disabled?"none":`0 0 8px ${c.g}`,
            transform: pressed?"scale(0.97)":"scale(1)",
            transition:"all 0.1s", width:"100%", marginTop:"10px",
            textTransform:"uppercase",
          }}>
          [{children}]
        </button>
      );
    }

    function Toggle({ label, value, onChange, variant="primary" }) {
      const col = variant==="danger" ? "#FF0000" : "#00FF41";
      return (
        <div onClick={()=>onChange(!value)} style={{
          display:"flex", alignItems:"center", gap:"14px",
          cursor:"pointer", padding:"13px 0", borderBottom:"1px solid #111",
          userSelect:"none",
        }}>
          <div style={{
            width:"40px", height:"22px",
            border:`1px solid ${value?col:"#2a2a2a"}`,

            justifyContent: value?"flex-end":"flex-start",

    function QuoteBox({ text, variant="discipline" }) {
      const col = variant==="shutdown"?"#FF0000":variant==="restore"?"#FFD700":"#00FF41";
      return (
        <div style={{

          <div style={{
            fontSize:"11px", color:col, letterSpacing:"0.05em",

            // "{text}"

        </div>
      );

    function ProgressBar({ label, onComplete, alterEgoWon }) {
      const [pct, setPct] = useState(0);
      const [done, setDone] = useState(false);
      const fired = useRef(false);
      useEffect(() => {
        const steps = [0,15,30,48,62,78,89,95,100];
        let i = 0;
        const iv = setInterval(() => {
          if (i < steps.length) {
            const val = steps[i];
            setPct(val);
            if (val===100 && !fired.current && !alterEgoWon) { fired.current=true; playSuccessSound(); }
            i++;
          } else { setDone(true); clearInterval(iv); setTimeout(onComplete, 600); }
        }, 280);
        return () => clearInterval(iv);
      }, []);
      const bars = Math.floor(pct/4);
      return (
        <div style={{ textAlign:"center", padding:"40px 20px" }}>
          <div style={{ fontSize:"11px", color:"#00FF41", letterSpacing:"0.15em", marginBottom:"20px", textShadow:"0 0 8px rgba(0,255,65,0.6)" }}>
            {done ? "// LOGS SECURED" : label}
          </div>
          <div style={{ border:"1px solid #00FF41", padding:"4px", marginBottom:"12px" }}>
            <div style={{
              height:"16px", width:`${pct}%`,
              background: done?"#00FF41":"repeating-linear-gradient(90deg,#00FF41 0px,#00FF41 6px,#003300 6px,#003300 8px)",
              transition:"width 0.25s", boxShadow:"0 0 10px rgba(0,255,65,0.5)",
            }} />
          </div>
          <div style={{ fontSize:"10px", color:"#00FF41", opacity:0.7 }}>
            {"[" + "█".repeat(bars) + "░".repeat(25-bars) + "]"} {pct}%
          </div>
        </div>
      );
    }

    function BreachScreen({ onResolve }) {

    function ResultScreen({ alterEgoWon, improvement, onDone }) {
      const isFailure = alterEgoWon;
      const col = isFailure ? "#FF0000" : "#00FF41";

    function ChecklistForm({ state, name, codename, onSubmit }) {
      const [energy, setEnergy] = useState(false);
      const [alterEgo, setAlterEgo] = useState(false);
      const [improvement, setImprovement] = useState("");
      const [encrypting, setEncrypting] = useState(false);
      const [done, setDone] = useState(false);

      if (done) return <ResultScreen alterEgoWon={alterEgo} improvement={improvement} onDone={()=>onSubmit({energy,alterEgo,improvement})} />;
      if (encrypting) return <ProgressBar label="// ENCRYPTING LOGS..." onComplete={()=>setDone(true)} alterEgoWon={alterEgo} />;

      return (
        <div>
          <div style={{ textAlign:"center", padding:"20px 0 24px", borderBottom:"1px solid #0d0d0d", marginBottom:"24px" }}>
            <div style={{ fontSize:"10px", color:"#555", letterSpacing:"0.15em", marginBottom:"2px" }}>// COMMANDER: {codename.toUpperCase()}</div>
            <div style={{ fontSize:"11px", color:"#888", letterSpacing:"0.15em", marginBottom:"4px" }}>// DAYS OF DISCIPLINE</div>
            <div style={{ fontSize:"clamp(52px,13vw,76px)", color:"#00FF41", textShadow:"0 0 30px rgba(0,255,65,0.4)", lineHeight:"1" }}>
              {String(state.streak).padStart(3,"0")}
            </div>
          </div>

          <div style={{ marginBottom:"24px" }}>
            <Toggle label="Protected my energy today" value={energy} onChange={setEnergy} />
            <Toggle label="Let the Alter Ego win [CRITICAL]" value={alterEgo} onChange={setAlterEgo} variant="danger" />
          </div>

          <div style={{ marginBottom:"24px" }}>
            <div style={{ fontSize:"10px", color:"#aaa", letterSpacing:"0.1em", marginBottom:"8px" }}>{">"} 1% IMPROVEMENT FOR TOMORROW:</div>
            <textarea
              value={improvement}
              onChange={e=>setImprovement(e.target.value)}
              placeholder="> Enter directive..."
              onFocus={e=>e.target.style.borderColor="#00FF41"}
              onBlur={e=>e.target.style.borderColor="#1a1a1a"}
              style={{
                width:"100%", minHeight:"80px",
                background:"#000", border:"1px solid #1a1a1a",
                color:"#00FF41", fontFamily:"'JetBrains Mono','Courier New',monospace",
                fontSize:"12px", padding:"12px", resize:"none",
                outline:"none", caretColor:"#00FF41", lineHeight:"1.6",
                transition:"border-color 0.2s",
              }}
            />
          </div>

          <Btn onClick={()=>setEncrypting(true)} disabled={!improvement.trim()} variant={alterEgo?"danger":"primary"}>
            Submit Daily Audit
          </Btn>
        </div>
      );
    }

    function AlreadyFiledScreen({ state, name, codename }) {
      const [tab, setTab] = useState("home"); // home | stats | history
      const logs = state.logs || [];

      // ── Stats calculations ──────────────────────────────────────
      const totalDays = logs.length;
      const greenDays = logs.filter(l => !l.alterEgo).length;
      const redDays = logs.filter(l => l.alterEgo).length;
      const winRate = totalDays > 0 ? Math.round((greenDays / totalDays) * 100) : 0;

      // Longest streak from logs
      let longest = 0, current = 0;
      [...logs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(l => {
        if (!l.alterEgo) { current++; longest = Math.max(longest, current); }
        else current = 0;
      });

      // Last 7 days grid
      const last7 = Array.from({length:7}, (_,i) => {
        const d = new Date(); d.setDate(d.getDate() - (6-i));
        const dateStr = d.toISOString().split("T")[0];
        const log = logs.find(l => l.date === dateStr);
        const dayName = d.toLocaleDateString("en-US",{weekday:"short"}).toUpperCase();
        return { dateStr, log, dayName };
      });

      // Monthly heatmap — last 5 weeks (35 days)
      const heatmapDays = Array.from({length:35}, (_,i) => {
        const d = new Date(); d.setDate(d.getDate() - (34-i));
        const dateStr = d.toISOString().split("T")[0];
        const log = logs.find(l => l.date === dateStr);
        return { dateStr, log };
      });

      const TabBtn = ({ id, label }) => (
        <button onClick={() => setTab(id)} style={{
          background: tab===id ? "#00FF4115" : "transparent",
          border: `1px solid ${tab===id ? "#00FF41" : "#1a1a1a"}`,
          color: tab===id ? "#00FF41" : "#555",
          fontFamily:"'JetBrains Mono','Courier New',monospace",
          fontSize:"10px", letterSpacing:"0.1em",
          padding:"7px 14px", cursor:"pointer",
          textTransform:"uppercase", flex:1,
          transition:"all 0.2s",
        }}>{label}</button>
      );

      return (
        <div style={{ padding:"20px 0" }}>
          {/* Streak */}
          <div style={{ textAlign:"center", marginBottom:"20px" }}>
            <div style={{ fontSize:"clamp(52px,13vw,76px)", color:"#00FF41", textShadow:"0 0 30px rgba(0,255,65,0.4)", lineHeight:"1", marginBottom:"4px" }}>
              {String(state.streak).padStart(3,"0")}
            </div>
            <div style={{ fontSize:"11px", color:"#888", letterSpacing:"0.15em" }}>// DAYS OF DISCIPLINE</div>
          </div>

          {/* Tabs */}
          <div style={{ display:"flex", gap:"6px", marginBottom:"20px" }}>
            <TabBtn id="home" label="Home" />
            <TabBtn id="stats" label="Stats" />
            <TabBtn id="history" label="History" />
          </div>

          {/* ── HOME TAB ── */}
          {tab === "home" && (
            <div>
              <div style={{ border:"1px solid #001a00", padding:"14px 16px", marginBottom:"16px" }}>
                <div style={{ fontSize:"11px", color:"#00FF4190", letterSpacing:"0.1em", lineHeight:"2" }}>
                  // AUDIT LOGGED FOR TODAY<br/>{">"} Return tomorrow, {name}.
                </div>
              </div>
              <QuoteBox text={getRandom(QUOTES.discipline)} variant="discipline" />

              {/* 7-day grid */}
              <div style={{ marginTop:"20px" }}>
                <div style={{ fontSize:"10px", color:"#555", letterSpacing:"0.1em", marginBottom:"10px" }}>// LAST 7 DAYS</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"4px" }}>
                  {last7.map(({dateStr, log, dayName}) => {
                    const col = !log ? "#1a1a1a" : log.alterEgo ? "#FF000033" : "#00FF4133";
                    const border = !log ? "#2a2a2a" : log.alterEgo ? "#FF0000" : "#00FF41";
                    return (
                      <div key={dateStr} style={{ textAlign:"center" }}>
                        <div style={{ fontSize:"8px", color:"#444", marginBottom:"4px", letterSpacing:"0.05em" }}>{dayName}</div>
                        <div style={{
                          height:"32px", background:col,
                          border:`1px solid ${border}`,
                          boxShadow: log ? `0 0 6px ${border}44` : "none",
                        }} />
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* ── STATS TAB ── */}
          {tab === "stats" && (
            <div>
              <div style={{ fontSize:"10px", color:"#555", letterSpacing:"0.1em", marginBottom:"16px" }}>// COMMANDER STATS</div>

              {/* Stat cards */}
              {[
                { label:"Total Days Filed", value: totalDays, color:"#00FF41" },
                { label:"Green Days", value: greenDays, color:"#00FF41" },
                { label:"Red Days", value: redDays, color:"#FF0000" },
                { label:"Win Rate", value: `${winRate}%`, color: winRate >= 70 ? "#00FF41" : winRate >= 50 ? "#FFD700" : "#FF0000" },
                { label:"Current Streak", value: state.streak, color:"#00FF41" },
                { label:"Longest Streak", value: longest, color:"#FFD700" },
              ].map(({label, value, color}) => (
                <div key={label} style={{
                  display:"flex", justifyContent:"space-between", alignItems:"center",
                  padding:"12px 0", borderBottom:"1px solid #0d0d0d",
                }}>
                  <div style={{ fontSize:"11px", color:"#888", letterSpacing:"0.05em" }}>{label}</div>
                  <div style={{ fontSize:"18px", color, fontWeight:700, textShadow:`0 0 8px ${color}44` }}>{value}</div>
                </div>
              ))}

              {/* Heatmap */}
              <div style={{ marginTop:"24px" }}>
                <div style={{ fontSize:"10px", color:"#555", letterSpacing:"0.1em", marginBottom:"10px" }}>// 35-DAY HEATMAP</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"3px" }}>
                  {heatmapDays.map(({dateStr, log}) => {
                    const col = !log ? "#111" : log.alterEgo ? "#FF000044" : "#00FF4144";
                    const border = !log ? "#1a1a1a" : log.alterEgo ? "#FF000088" : "#00FF4188";
                    return (
                      <div key={dateStr} title={dateStr} style={{
                        height:"28px", background:col,
                        border:`1px solid ${border}`,
                        boxShadow: log ? `0 0 4px ${border}` : "none",
                      }} />
                    );
                  })}
                </div>
                <div style={{ display:"flex", gap:"12px", marginTop:"8px", justifyContent:"flex-end" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:"4px" }}>
                    <div style={{ width:"10px", height:"10px", background:"#00FF4144", border:"1px solid #00FF4188" }} />
                    <span style={{ fontSize:"9px", color:"#555" }}>Green</span>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:"4px" }}>
                    <div style={{ width:"10px", height:"10px", background:"#FF000044", border:"1px solid #FF000088" }} />
                    <span style={{ fontSize:"9px", color:"#555" }}>Red</span>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:"4px" }}>
                    <div style={{ width:"10px", height:"10px", background:"#111", border:"1px solid #1a1a1a" }} />
                    <span style={{ fontSize:"9px", color:"#555" }}>Missed</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── HISTORY TAB ── */}
          {tab === "history" && (
            <div>
              <div style={{ fontSize:"10px", color:"#555", letterSpacing:"0.1em", marginBottom:"16px" }}>
                // PAST 1% IMPROVEMENTS — {logs.length} ENTRIES
              </div>
              {logs.length === 0 ? (
                <div style={{ fontSize:"11px", color:"#333", textAlign:"center", padding:"30px 0" }}>
                  {">"} No entries yet, Commander.
                </div>
              ) : (
                <div style={{ maxHeight:"400px", overflowY:"auto" }}>
                  {[...logs].reverse().map((log, i) => (
                    <div key={i} style={{
                      borderLeft:`3px solid ${log.alterEgo ? "#FF0000" : "#00FF41"}`,
                      padding:"12px 14px", marginBottom:"10px",
                      background: log.alterEgo ? "#FF000008" : "#00FF4108",
                      border:`1px solid ${log.alterEgo ? "#FF000022" : "#00FF4122"}`,
                      borderLeft:`3px solid ${log.alterEgo ? "#FF0000" : "#00FF41"}`,
                    }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"6px" }}>
                        <div style={{ fontSize:"10px", color: log.alterEgo ? "#FF000088" : "#00FF4188", letterSpacing:"0.1em" }}>
                          {log.alterEgo ? "// RED DAY" : "// GREEN DAY"}
                        </div>
                        <div style={{ fontSize:"9px", color:"#444" }}>{log.date}</div>
                      </div>
                      <div style={{ fontSize:"12px", color:"#bbb", lineHeight:"1.6" }}>
                        {log.improvement}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // INIT SCREEN — First time setup
    // ============================================================
    function InitScreen({ onComplete }) {
      const [name, setName] = useState("");
      const [codename, setCodename] = useState("");
      const [step, setStep] = useState(0); // 0=typing, 1=launching

      const handleLaunch = () => {
        if (!name.trim() || !codename.trim()) return;
        setStep(1);
        setTimeout(() => onComplete(name.trim(), codename.trim()), 2000);
      };

      const inputStyle = {
        width:"100%", background:"#000",
        border:"1px solid #1a1a1a", color:"#00FF41",
        fontFamily:"'JetBrains Mono','Courier New',monospace",
        fontSize:"13px", padding:"12px",
        outline:"none", caretColor:"#00FF41",
        letterSpacing:"0.05em", marginTop:"6px",
        transition:"border-color 0.2s",
      };

      if (step === 1) {
        return (
          <div style={{ textAlign:"center", padding:"40px 0" }}>
            <div className="flicker" style={{
              fontSize:"14px", color:"#00FF41",
              letterSpacing:"0.15em", lineHeight:"2.2",
              textShadow:"0 0 10px rgba(0,255,65,0.6)",
            }}>
              {">"} IDENTITY CONFIRMED<br/>
              {">"} INITIALIZING MISSION...<br/>
              {">"} WELCOME, {codename.toUpperCase()}<br/>
              {">"} SET SAIL. 🦅
            </div>
          </div>
        );
      }

      return (
        <div style={{ padding:"10px 0 30px" }}>
          <div style={{ marginBottom:"28px" }}>
            <div style={{ fontSize:"11px", color:"#00FF41", letterSpacing:"0.15em", marginBottom:"4px", textShadow:"0 0 8px rgba(0,255,65,0.5)" }}>
              // SYSTEM INITIALIZATION
            </div>
            <div style={{ fontSize:"11px", color:"#555", letterSpacing:"0.08em", lineHeight:"1.8" }}>
              {">"} First-time setup. This runs once.<br/>
              {">"} Identity will be locked to this device.
            </div>
          </div>

          {/* Name */}
          <div style={{ marginBottom:"20px" }}>
            <div style={{ fontSize:"10px", color:"#aaa", letterSpacing:"0.1em" }}>{">"} YOUR NAME:</div>
            <input
              type="text"
              value={name}
              onChange={e => setName(e.target.value)}
              placeholder="> e.g. Farman"
              maxLength={30}
              onFocus={e => e.target.style.borderColor="#00FF41"}
              onBlur={e => e.target.style.borderColor="#1a1a1a"}
              style={inputStyle}
            />
          </div>

          {/* Codename */}
          <div style={{ marginBottom:"28px" }}>
            <div style={{ fontSize:"10px", color:"#aaa", letterSpacing:"0.1em" }}>{">"} YOUR CODENAME:</div>
            <input
              type="text"
              value={codename}
              onChange={e => setCodename(e.target.value)}
              placeholder="> e.g. Falcon"
              maxLength={20}
              onFocus={e => e.target.style.borderColor="#00FF41"}
              onBlur={e => e.target.style.borderColor="#1a1a1a"}
              style={inputStyle}
            />
            <div style={{ fontSize:"9px", color:"#333", marginTop:"6px", letterSpacing:"0.05em" }}>
              {">"} This is your call sign. Choose wisely.
            </div>
          </div>

          <Btn onClick={handleLaunch} disabled={!name.trim() || !codename.trim()}>
            Initialize System — Set Sail 🦅
          </Btn>
        </div>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function App() {
      const [appState, setAppState] = useState(null);
      const [screen, setScreen] = useState("loading");

      useEffect(() => {
        const init = async () => {
          const raw = (await MockDB.getState()) || MockDB.defaultState();
          const t = today(), y = yesterday();
          if (!raw.name) { setAppState(raw); setScreen("init"); return; }
          if (raw.lastSubmitDate === t) { setAppState(raw); setScreen("filed"); return; }
          if (raw.lastSubmitDate && raw.lastSubmitDate !== y && raw.lastSubmitDate !== t) { setAppState(raw); setScreen("breach"); return; }
          setAppState(raw); setScreen("checklist");
        };
        init();
      }, []);

      const handleInit = (name, codename) => {
        const u = {...appState, name, codename};
        MockDB.setState(u); setAppState(u); setScreen("checklist");
      };

      const handleBreachResolve = (res) => {
        const u = {...appState};
        if (res==="reset") u.streak = 0;
        setAppState(u); MockDB.setState(u); setScreen("checklist");
      };

      const handleSubmit = ({energy,alterEgo,improvement}) => {
        const u = {...appState};
        u.lastSubmitDate = today();
        u.streak = alterEgo ? 0 : (u.streak||0)+1;
        u.logs = [...(u.logs||[]), {date:today(),energy,alterEgo,improvement}];
        MockDB.setState(u); setAppState(u); setScreen("filed");
      };

      const name = appState?.name || "Commander";
      const codename = appState?.codename || "CDR";

      const renderScreen = () => {
        if (screen==="loading"||!appState) return <div style={{textAlign:"center",padding:"40px",fontSize:"11px",color:"#666"}}>{">"} INITIALIZING SYSTEM...</div>;
        if (screen==="init") return <InitScreen onComplete={handleInit} />;
        if (screen==="breach") return <BreachScreen onResolve={handleBreachResolve} />;
        if (screen==="checklist") return <ChecklistForm state={appState} name={name} codename={codename} onSubmit={handleSubmit} />;
        if (screen==="filed") return <AlreadyFiledScreen state={appState} name={name} codename={codename} />;
      };

      const dateStr = new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"}).toUpperCase();

      return (
        <>
          <CRTOverlay />
          <div style={{ minHeight:"100vh", background:"#000", display:"flex", justifyContent:"center", padding:"24px 16px" }}>
            <div style={{ width:"100%", maxWidth:"480px" }}>

              {/* Header */}
              <div style={{ marginBottom:"8px" }}>
                <div style={{ fontSize:"10px", color:"#556", letterSpacing:"0.2em", marginBottom:"6px", display:"flex", alignItems:"center", gap:"8px" }}>
                  {">"} FALCON'S HUNT — CLASSIFIED SYSTEM v1.0
                  {appState?.codename ? ` — ${appState.codename.toUpperCase()}` : ""}
                  <span id="syncDot" title="OFFLINE" style={{ width:"7px", height:"7px", borderRadius:"50%", background:"#333", display:"inline-block", flexShrink:0, transition:"background 0.4s" }} />
                </div>
                <GlitchHeader />
                <div style={{ fontSize:"10px", color:"#556", letterSpacing:"0.1em", marginTop:"5px" }}>
                  {">"} {dateStr}
                </div>
              </div>

              {/* Divider */}
              <div style={{ height:"1px", background:"linear-gradient(90deg,#00FF41,transparent)", margin:"16px 0 24px", boxShadow:"0 0 6px rgba(0,255,65,0.3)" }} />

              {/* Screen */}
              {renderScreen()}

              {/* Footer */}
              <div style={{ marginTop:"40px", borderTop:"1px solid #0a0a0a", paddingTop:"16px", fontSize:"9px", color:"#444", letterSpacing:"0.1em", textAlign:"center" }}>
                // OPERATIONAL SECURITY ENABLED — ALL LOGS ENCRYPTED LOCALLY
              </div>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.log('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
